<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>留給妳</title>
<link rel="preconnect" href="https://abm-mj.pages.dev">
<link rel="dns-prefetch" href="https://abm-mj.pages.dev">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #000; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; overflow: hidden; }
    
    .container { 
        height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; 
        -webkit-overflow-scrolling: touch; contain: strict;
    }
    
    .page { 
        height: 100vh; width: 100%; scroll-snap-align: start; 
        position: relative; overflow: hidden; background: #000; 
        display: flex; align-items: center; justify-content: center;
        content-visibility: auto;
    }
    
    .page img { 
        position: absolute; width: 100%; height: 100%; object-fit: cover; 
        opacity: 0; transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1), transform 12s linear;
        transform: scale(1.02); object-position: center;
        will-change: opacity, transform;
    }

    .page.active img { opacity: 0.6; transform: scale(1.1); }

    /* 文字電影感核心：慢速、模糊對焦、位移 */
    .text-content { max-width: 80%; text-align: center; z-index: 1; }
    
    .text-content p { 
        color: rgba(255, 255, 255, 0.9); 
        font-size: 17px; line-height: 2.8; letter-spacing: 0.22em; 
        font-weight: 300; text-shadow: 0 2px 15px rgba(0,0,0,1); 
        margin-bottom: 12px;
        
        /* 初始狀態：透明、模糊、下移 */
        opacity: 0; 
        filter: blur(8px);
        transform: translateY(15px);
        transition: 
            opacity 2.8s cubic-bezier(0.4, 0, 0.2, 1), 
            filter 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
            transform 3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    
    /* 激活狀態：文字逐行浮現 */
    .page.active .text-content p { opacity: 1; filter: blur(0px); transform: translateY(0); }
    
    /* 設置逐行延遲，模擬思緒流淌 */
    .page.active .text-content p:nth-child(1) { transition-delay: 0.2s; }
    .page.active .text-content p:nth-child(2) { transition-delay: 0.8s; }
    .page.active .text-content p:nth-child(3) { transition-delay: 1.4s; }
    .page.active .text-content p:nth-child(4) { transition-delay: 2.0s; }
    .page.active .text-content p:nth-child(5) { transition-delay: 2.6s; }
    .page.active .text-content p:nth-child(6) { transition-delay: 3.2s; }

    .highlight { 
        color: #d4af37 !important; font-size: 19px !important; font-weight: 600 !important; 
        letter-spacing: 0.3em !important; margin-top: 35px; display: block;
        text-shadow: 0 0 25px rgba(212, 175, 55, 0.35) !important;
    }

    /* 忍住按鈕：深呼吸感 */
    @keyframes breathing {
        0%, 100% { opacity: 0.05; filter: blur(2px); }
        50% { opacity: 0.45; filter: blur(0px); }
    }

    .exit { 
        position: fixed; bottom: 45px; left: 35px; z-index: 1000; 
        color: #d4af37; font-size: 14px; text-decoration: none; 
        letter-spacing: 4px; font-weight: 300; opacity: 0; 
        pointer-events: none; transition: opacity 3.5s ease;
    }
    .exit.show { animation: breathing 7s ease-in-out infinite; pointer-events: auto; }

    #music { position: fixed; top: 35px; right: 25px; z-index: 1000; font-size: 26px; color: #d4af37; cursor: pointer; opacity: 0.3; transition: opacity 0.8s; }
    #music.playing { animation: rotate 12s linear infinite; opacity: 0.8; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<div id="music">♫</div>
<a href="https://abm-mj.pages.dev" target="_blank" class="exit" id="exit-btn">忍住</a>

<div class="container" id="main-container"></div>

<script>
const data = [
    { text: ["古剎千年，見過多少人來去","唯獨妳站在這裡","讓覺得，值得駐足","不是因為這裡有多美","是因為妳在"], img: "p1.jpg" },
    { text: ["這座城市我走了很久","直到妳來，才覺得有人一起看","才算真的看見了","以前一個人走過這裡，只是路過","現在想帶妳重新走一遍"], img: "p2.jpg" },
    { text: ["錦鯉不問來路，只管游","我也是，只管靠近妳","它們不知道終點在哪","我知道","終點是妳在的地方"], img: "p3.jpg" },
    { text: ["水往低處走，我往妳那裡走","都是本能，都不需要理由","遇見妳之前","我也在找方向"], img: "p4.jpg" },
    { text: ["451米，夠高了","但站在這裡，我想的還是妳在哪","俯瞰整座城市","卻只想看見妳"], img: "p5.jpg" },
    { text: ["人來人往，妳一個人站在那裡","從那一刻起","那個位置就只屬於妳了","千萬人裡，我一眼就看見妳"], img: "p6.jpg" },
    { text: ["淨手，是為了虔誠地許願","在這裡許的願，我替妳守著","妳只管往前走","我在"], img: "p7.jpg" },
    { text: ["你走在那條街上，人那麼多","我一眼就找到你","後來我想，可能不管在哪裡","我都會先看見你"], img: "p8.jpg" },
    { text: ["全世界最多人的路口","你走在裡面，我的眼睛只有你","那一刻我確定，不管走到哪裡","我都想跟著你"], img: "p9.jpg" },
    { text: ["你站在那只狗旁邊，笑得很真","我給你拍這張的時候想","以後我也要這樣等你","不管多久"], img: "p10.jpg" },
    { text: ["你拿筷子的方式很好看","夾肉的時候專注得像在做一件大事","那頓飯我吃了什麼我忘了","我記得的是你每次吃到好吃的會先看我一眼"], img: "p11.jpg" },
    { text: ["你在便利店買了泡麵","還有一瓶果汁，說這才是日本的味道","你吃得很滿足，那一刻我覺得","帶你來這裡，是做對了的事"], img: "p12.jpg" },
    { text: ["你說這碗面太燙","然後還是一口接一口","你就是這樣，嘴上說算了","其實什麼都認真"], img: "p13.jpg" },
    { text: ["你站在站台上看路線圖","認真得像在解一道題","我喜歡你認真的樣子，喜歡了很久","那天終於可以站在你旁邊看"], img: "p14.jpg" },
    { text: ["你站在站台上，電車還沒來","你也不看手機，就那樣站著","我突然覺得，能陪你等一班電車","也是一種幸福"], img: "p15.jpg" },
    { text: ["你突然停下來拍那塊招牌","我差點撞上你","那一刻我不想說你","因為你開心的樣子讓我舍不得"], img: "p16.jpg" },
    { text: ["候機的時候你刷手機","我看著你，你問我看什麼","我說沒什麼","其實是什麼都有"], img: "p17.jpg" },
    { text: ["那個背影不是你，但我看了很久","後來我想，大概是因為她走路的样子","有一點像你"], img: "p18.jpg" },
    { text: ["你靠著艙壁閉眼，我知道你沒睡","你只是在感受飛起來之前的那一刻","後來我也學會了，跟你在一起","很多時刻不需要說話"], img: "p19.jpg" },
    { text: ["這趟日本，我們沒有說過什麼大話","但每一頓飯、每一個站台、每一次你回頭看我","都讓我知道——","我們之間，已經不一樣了"], img: "p20.jpg" }
];

const container = document.getElementById("main-container");
const exitBtn = document.getElementById("exit-btn");

const fragment = document.createDocumentFragment();
data.forEach((item, i) => {
    let textPage = document.createElement('section');
    textPage.className = 'page';
    let textHtml = `<div class="text-content">`;
    item.text.forEach((line, j) => {
        textHtml += (j === item.text.length - 1) ? `<p class="highlight">${line}</p>` : `<p>${line}</p>`;
    });
    textHtml += `</div>`;
    textPage.innerHTML = textHtml;
    fragment.appendChild(textPage);

    let imgPage = document.createElement('section');
    imgPage.className = 'page';
    const priority = i === 0 ? 'high' : 'auto';
    imgPage.innerHTML = `<img data-src="${item.img}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" fetchpriority="${priority}">`;
    fragment.appendChild(imgPage);
});

if (fragment.children.length > 39) {
    fragment.removeChild(fragment.lastChild); 
} else {
    for(let k=fragment.children.length; k < 39; k++) {
        fragment.appendChild(document.createElement('section')).className = 'page';
    }
}
container.appendChild(fragment);

const observerOptions = { threshold: 0.4 };
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const target = entry.target;
            target.classList.add('active');
            const img = target.querySelector('img');
            if (img && img.dataset.src) {
                img.src = img.dataset.src;
                delete img.dataset.src;
            }
            const index = Array.from(container.children).indexOf(target);
            if (index >= container.children.length - 2) exitBtn.classList.add('show');
            else exitBtn.classList.remove('show');
        } else {
            entry.target.classList.remove('active');
        }
    });
}, observerOptions);

Array.from(container.children).forEach(page => observer.observe(page));

const idlePreload = () => {
    if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
            data.slice(2).forEach(item => {
                const link = document.createElement('link');
                link.rel = 'preload'; link.as = 'image'; link.href = item.img;
                document.head.appendChild(link);
            });
        });
    }
};

const audio = document.getElementById("bgm");
const btn = document.getElementById("music");
const startAudio = () => {
    if(audio.paused) { audio.play().catch(()=>{}); btn.classList.add('playing'); }
};
btn.onclick = (e) => {
    e.stopPropagation();
    if(audio.paused) startAudio();
    else { audio.pause(); btn.classList.remove('playing'); }
};
document.addEventListener("click", startAudio, {once: true});
window.addEventListener('load', idlePreload);
</script>
</body>
</html>
