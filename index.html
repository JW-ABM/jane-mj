<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>留給妳</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; overflow: hidden; }
    
    .container { height: 100vh; overflow-y: auto; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
    .page { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
    
    .page img { 
        position: absolute; width: 100%; height: 100%; object-fit: cover; 
        opacity: 0; transition: opacity 2s ease-in-out, transform 8s linear;
        transform: scale(1.05); object-position: center;
    }

    .page.active img { opacity: 0.6; transform: scale(1.12); }

    /* 特殊佈局修復 */
    .container .page:nth-child(4) img { object-fit: contain !important; transform: scale(1) !important; }
    .container .page:nth-child(10) img { object-position: top center; }
    .container .page:nth-child(22) img { object-fit: contain !important; transform: scale(1) !important; }

    .text-content { max-width: 85%; text-align: center; z-index: 1; opacity: 0; transition: opacity 1.5s ease-in-out 0.5s; }
    .page.active .text-content { opacity: 1; }
    .text-content p { color: rgba(255, 255, 255, 0.85); font-size: 17px; line-height: 2.6; letter-spacing: 0.15em; font-weight: 300; text-shadow: 0 2px 10px rgba(0,0,0,0.9); margin-bottom: 8px; }
    
    .highlight { 
        color: #d4af37 !important; font-size: 19px !important; font-weight: 600 !important; 
        letter-spacing: 0.25em !important; margin-top: 25px; display: block;
        text-shadow: 0 0 12px rgba(212, 175, 55, 0.4) !important;
    }

    /* 忍住按鈕：忽隱忽現動畫 */
    @keyframes breathing {
        0% { opacity: 0.1; filter: blur(1px); }
        50% { opacity: 0.5; filter: blur(0px); }
        100% { opacity: 0.1; filter: blur(1px); }
    }

    .exit { 
        position: fixed; bottom: 45px; left: 35px; z-index: 1000; 
        color: #d4af37; font-size: 15px; text-decoration: none; 
        letter-spacing: 2px; font-weight: 300; opacity: 0; 
        transition: opacity 2s ease;
    }
    .exit.show { animation: breathing 4s ease-in-out infinite; }

    #music { position: fixed; top: 35px; right: 25px; z-index: 1000; font-size: 28px; color: #d4af37; cursor: pointer; opacity: 0.4; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #music.playing { animation: rotate 6s linear infinite; opacity: 1; }
</style>
</head>
<body>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<div id="music">♫</div>
<a href="https://abm-mj.pages.dev" target="_blank" class="exit" id="exit-btn">忍住</a>

<div class="container" id="main-container"></div>

<script>
const data = [
    { text: ["古剎千年，見過多少人來去","唯獨妳站在這裡","讓覺得，值得駐足","不是因為這裡有多美","是因為妳在"], img: "p1.jpg" },
    { text: ["這座城市我走了很久","直到妳來，才覺得有人一起看","才算真的看見了","以前一個人走過這裡，只是路過","現在想帶妳重新走一遍"], img: "p2.jpg" },
    { text: ["錦鯉不問來路，只管游","我也是，只管靠近妳","它們不知道終點在哪","我知道","終點是妳在的地方"], img: "p3.jpg" },
    { text: ["水往低處走，我往妳那裡走","都是本能，都不需要理由","遇見妳之前","我也在找方向"], img: "p4.jpg" },
    { text: ["451米，夠高了","但站在這裡，我想的還是妳在哪","俯瞰整座城市","卻只想看見妳"], img: "p5.jpg" },
    { text: ["人來人往，妳一個人站在那裡","從那一刻起","那個位置就只屬於妳了","千萬人裡，我一眼就看見妳"], img: "p6.jpg" },
    { text: ["淨手，是為了虔誠地許願","在這裡許的願，我替妳守著","妳只管往前走","我在"], img: "p7.jpg" },
    { text: ["你走在那條街上，人那麼多","我一眼就找到你","後來我想，可能不管在哪裡","我都會先看見你"], img: "p8.jpg" }, // 匹配截圖文件名
    { text: ["全世界最多人的路口","你走在裡面，我的眼睛只有你","那一刻我確定，不管走到哪裡","我都想跟著你"], img: "p9.jpg" },
    { text: ["你站在那只狗旁邊，笑得很真","我給你拍這張的時候想","以後我也要這樣等你","不管多久"], img: "p10.jpg" },
    { text: ["你拿筷子的方式很好看","夾肉的時候專注得像在做一件大事","那頓飯我吃了什麼我忘了","我記得的是你每次吃到好吃的會先看我一眼"], img: "p11.jpg" },
    { text: ["你在便利店買了泡麵","還有一瓶果汁，說這才是日本的味道","你吃得很滿足，那一刻我覺得","帶你來這裡，是做對了的事"], img: "p12.jpg" },
    { text: ["你說這碗面太燙","然後還是一口接一口","你就是這樣，嘴上說算了","其實什麼都認真"], img: "p13.jpg" },
    { text: ["你站在站台上看路線圖","認真得像在解一道題","我喜歡你認真的樣子，喜歡了很久","那天終於可以站在你旁邊看"], img: "p14.jpg" },
    { text: ["你站在站台上，電車還沒來","你也不看手機，就那樣站著","我突然覺得，能陪你等一班電車","也是一種幸福"], img: "p15.jpg" },
    { text: ["你突然停下來拍那塊招牌","我差點撞上你","那一刻我不想說你","因為你開心的樣子讓我舍不得"], img: "p16.jpg" },
    { text: ["候機的時候你刷手機","我看著你，你問我看什麼","我說沒什麼","其實是什麼都有"], img: "p17.jpg" },
    { text: ["你走在我前面","大衣的下擺隨著步子輕輕晃","我故意走慢了一點","就為了多看你走路的樣子"], img: "p18.jpg" },
    { text: ["你靠著艙壁閉眼，我知道你沒睡","你只是在感受飛起來之前的那一刻","後來我也學會了，跟你在一起","很多時刻不需要說話"], img: "p19.jpg" },
    { text: ["這趟日本，我們沒有說過什麼大話","但每一頓飯、每一個站台、每一次你回頭看我","都讓我知道——","我們之間，已經不一樣了"], img: "p20.jpg" }
];

const container = document.getElementById("main-container");
const exitBtn = document.getElementById("exit-btn");

// 構建頁面
data.forEach((item, i) => {
    // 文案頁
    let textPage = document.createElement('section');
    textPage.className = 'page';
    let textHtml = `<div class="text-content">`;
    item.text.forEach((line, j) => {
        textHtml += (j === item.text.length - 1) ? `<p class="highlight">${line}</p>` : `<p>${line}</p>`;
    });
    textHtml += `</div>`;
    textPage.innerHTML = textHtml;
    container.appendChild(textPage);

    // 圖片頁
    let imgPage = document.createElement('section');
    imgPage.className = 'page';
    // 前 3 張圖片 eager 加載，其餘 lazy
    const loadingStrategy = i < 3 ? 'eager' : 'lazy';
    imgPage.innerHTML = `<img src="${item.img}" loading="${loadingStrategy}" data-index="${i}">`;
    container.appendChild(imgPage);
});

// 湊齊 39 頁
const currentCount = container.children.length;
for(let k=0; k < (39 - currentCount); k++) {
    let blankPage = document.createElement('section');
    blankPage.className = 'page';
    container.appendChild(blankPage);
}

// 預加載下一張圖片的邏輯
const preloadNext = (idx) => {
    const nextData = data[idx + 1];
    if (nextData) {
        const img = new Image();
        img.src = nextData.img;
    }
};

container.onscroll = () => {
    const scrollPos = container.scrollTop;
    const height = window.innerHeight;
    const activeIndex = Math.round(scrollPos / height);
    
    Array.from(container.children).forEach((p, idx) => {
        if(idx === activeIndex) {
            p.classList.add('active');
            // 當前是文案頁時，預加載對應圖片
            if(idx % 2 === 0) preloadNext(idx / 2);
        } else {
            p.classList.remove('active');
        }
    });

    // 忍住按鈕：35頁開始呼吸
    if(activeIndex >= 34) {
        exitBtn.classList.add('show');
    } else {
        exitBtn.classList.remove('show');
    }
};

// 音頻處理 (保持不變)
const audio = document.getElementById("bgm");
const btn = document.getElementById("music");
const startAudio = () => {
    if(audio.paused) {
        audio.play().catch(()=>{});
        btn.classList.add('playing');
    }
};
btn.onclick = (e) => {
    e.stopPropagation();
    if(audio.paused) startAudio();
    else { audio.pause(); btn.classList.remove('playing'); }
};
document.addEventListener("click", startAudio, {once: true});

// 初始化第一頁
setTimeout(() => container.children[0].classList.add('active'), 100);
</script>
</body>
</html>
